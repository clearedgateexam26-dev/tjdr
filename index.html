<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam Pro - 10 Question Mock Test</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --primary: #00c853;
            --secondary: #2196F3;
            --text: #ffffff;
            --wrong: #b71c1c;
            --correct: #1b5e20;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .quiz-card { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 700px; border: 1px solid #333; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        
        .header-controls { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        input[type="text"] { width: 70%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #252525; color: white; margin-bottom: 15px; }
        
        button { border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-gen:hover { background: #009624; transform: translateY(-2px); }
        .btn-submit { background: var(--secondary); color: white; width: 100%; font-size: 1.1rem; margin-top: 20px; }
        .btn-save { background: #607d8b; color: white; display: none; margin-top: 15px; width: 100%; }

        .question-block { margin-bottom: 25px; padding: 20px; border-radius: 10px; background: #252525; border: 1px solid #333; }
        .option-label { display: block; background: #2d2d2d; padding: 12px; margin: 8px 0; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .option-label:hover { background: #383838; }

        /* Correction Classes */
        .correct { background: var(--correct) !important; border: 1px solid var(--primary) !important; }
        .wrong { background: var(--wrong) !important; border: 1px solid #ff5252 !important; }
        
        .explanation { display: none; margin-top: 10px; padding: 10px; background: #1a1a1a; border-left: 4px solid var(--secondary); font-size: 0.9rem; color: #ccc; }
        
        #result-area { text-align: center; font-size: 1.8rem; font-weight: bold; margin-top: 20px; padding: 20px; border-radius: 10px; display: none; background: #252525; }
        .loader { text-align: center; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="quiz-card">
    <h2>AI Exam Pro</h2>
    <div class="header-controls">
        <input type="text" id="topic" placeholder="Enter Topic (e.g., SSC History, Bank English)" value="SSC General Awareness">
        <br>
        <button class="btn-gen" onclick="generateQuiz()">📝 Generate 10 Questions</button>
    </div>

    <div id="quiz-container">
        <p class="loader">Enter a topic and click generate to start your test.</p>
    </div>

    <div id="result-area"></div>
    <button id="save-btn" class="btn-save" onclick="saveResults()">💾 Download Report (.txt)</button>
</div>

<script>
    let currentQuizData = [];
    let score = 0;

    async function generateQuiz() {
        const topic = document.getElementById('topic').value;
        const container = document.getElementById('quiz-container');
        const saveBtn = document.getElementById('save-btn');
        const resultArea = document.getElementById('result-area');
        
        // Reset UI
        saveBtn.style.display = "none";
        resultArea.style.display = "none";
        container.innerHTML = '<div class="loader">🤖 AI is thinking... This takes about 5-10 seconds.</div>';

        try {
            const response = await fetch(`/api/quiz?topic=${encodeURIComponent(topic)}`);
            if (!response.ok) throw new Error('Server error');
            
            currentQuizData = await response.json();

            container.innerHTML = currentQuizData.map((item, qIdx) => `
                <div class="question-block">
                    <p><strong>Q${qIdx + 1}:</strong> ${item.q}</p>
                    <div id="options-${qIdx}">
                        ${item.options.map((opt, oIdx) => `
                            <label class="option-label" id="label-${qIdx}-${oIdx}">
                                <input type="radio" name="q${qIdx}" value="${oIdx}"> ${opt}
                            </label>
                        `).join('')}
                    </div>
                    <div class="explanation" id="exp-${qIdx}">
                        <strong>Explanation:</strong> ${item.explanation || "No explanation provided."}
                    </div>
                </div>
            `).join('') + `<button class="btn-submit" id="submit-btn" onclick="submitQuiz()">Submit Test</button>`;

        } catch (err) {
            container.innerHTML = `<p style="color: #ff5252; text-align: center;">Error: Could not connect to the API. Make sure 'node server.js' is running.</p>`;
        }
    }

    function submitQuiz() {
        score = 0;
        currentQuizData.forEach((question, qIdx) => {
            const selected = document.querySelector(`input[name="q${qIdx}"]:checked`);
            const correctIdx = question.correct;

            // Highlight Correct Answer
            document.getElementById(`label-${qIdx}-${correctIdx}`).classList.add('correct');

            if (selected) {
                const selectedIdx = parseInt(selected.value);
                if (selectedIdx === correctIdx) {
                    score++;
                } else {
                    document.getElementById(`label-${qIdx}-${selectedIdx}`).classList.add('wrong');
                }
            }

            // Show explanation for every question
            document.getElementById(`exp-${qIdx}`).style.display = "block";
            
            // Disable inputs
            document.querySelectorAll(`input[name="q${qIdx}"]`).forEach(input => input.disabled = true);
        });

        // Show Results
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = "block";
        resultArea.innerHTML = `Your Score: ${score} / ${currentQuizData.length}`;
        resultArea.style.color = score >= 7 ? "#00c853" : "#ff5252";

        document.getElementById('save-btn').style.display = "block";
        document.getElementById('submit-btn').style.display = "none";
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function saveResults() {
        const topic = document.getElementById('topic').value;
        const date = new Date().toLocaleString();
        const content = `--- AI EXAM PRO REPORT ---\nDate: ${date}\nTopic: ${topic}\nScore: ${score}/10\n--------------------------\nKeep practicing!`;
        
        const blob = new Blob([content], { type: 'text/plain' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `Result_${topic.replace(/\s+/g, '_')}.txt`;
        link.click();
    }
</script>

</body>
</html>
